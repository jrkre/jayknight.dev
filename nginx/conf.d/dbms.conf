server {
    listen 80;
    listen 443 ssl;
    server_name dbms.jayknight.dev;

    ssl_certificate     /etc/nginx/certs/cloudflare.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Re-resolve upstream DNS at runtime (prevents stale IP after container restarts)
    resolver 10.89.0.1 valid=10s;
    set $dbms_upstream http://dbms:5000;

    location / {
        proxy_pass $dbms_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }
}
