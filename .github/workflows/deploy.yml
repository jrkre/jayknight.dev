name: Test and Deploy

on:
  push:
    branches: [main]

jobs:
  test-react:
    name: React tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-site
    steps:
      - uses: actions/checkout@v4
        with:
          repository: jrkre/website
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-site/package-lock.json
      - run: npm ci
      - run: npm test -- --watchAll=false --passWithNoTests

  deploy-react-site:
    name: Deploy react-site
    needs: test-react
    runs-on: ubuntu-latest
    steps:
      - uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no jrkre@100.109.174.32 "cd /home/jrkre/web/website && git pull && cd /home/jrkre/web && docker compose up --build -d react-site"

  deploy-dbms:
    name: Deploy dbms
    runs-on: ubuntu-latest
    steps:
      - uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no jrkre@100.109.174.32 "cd /home/jrkre/web/dbms && git pull && cd /home/jrkre/web && docker compose up --build -d dbms"
